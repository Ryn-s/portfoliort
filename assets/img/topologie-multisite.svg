<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Topologie du réseau multi-sites : cœur FAI à 3 AS, clients UC Exchange et ABC Conseil interconnectés en MPLS-VPN" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .lbl{ fill:#9aa7b8; font-size:11px; font-family:'JetBrains Mono',monospace; }
      .lblw{ fill:#e6edf3; font-size:12px; font-weight:600; }
      .lbla{ fill:#4dd4ac; font-size:11px; font-family:'JetBrains Mono',monospace; }
      .as{ fill:none; stroke:#5b9dff; stroke-width:1; stroke-dasharray:5 4; opacity:.6; }
      .asfill{ fill:#5b9dff; opacity:.05; }
      .site{ fill:#161b22; stroke:#283040; stroke-width:1; }
      .siteUC{ fill:#161b22; stroke:#4dd4ac; stroke-width:1.2; }
      .siteABC{ fill:#161b22; stroke:#f0a868; stroke-width:1.2; }
      .core{ fill:#1c2330; stroke:#5b9dff; stroke-width:1; }
      .link{ stroke:#5d6b7d; stroke-width:1.2; fill:none; }
      .linkmpls{ stroke:#4dd4ac; stroke-width:1.5; fill:none; opacity:.8; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="28" class="lblw" font-size="13" fill="#e6edf3">Topologie — Réseau multi-sites · interconnexion opérateur MPLS-VPN</text>
  <text x="30" y="44" class="lbl">FAI : 3 systèmes autonomes (RIP / OSPF + BGP/MP-BGP) · 2 clients e-commerce</text>

  <!-- ===== FAI CORE CONTAINER ===== -->
  <rect x="225" y="70" width="310" height="320" rx="14" fill="#0d1117" stroke="#283040" stroke-width="1"/>
  <text x="240" y="90" class="lbl" fill="#5b9dff">CŒUR RÉSEAU — FAI</text>

  <!-- AS 10 -->
  <ellipse cx="300" cy="160" rx="60" ry="46" class="asfill"/>
  <ellipse cx="300" cy="160" rx="60" ry="46" class="as"/>
  <text x="300" y="128" class="lbl" text-anchor="middle" fill="#5b9dff">AS 10 · RIP</text>
  <rect x="278" y="150" width="44" height="22" rx="4" class="core"/>
  <text x="300" y="165" class="lbl" text-anchor="middle">P1·RR</text>

  <!-- AS 20 -->
  <ellipse cx="455" cy="160" rx="60" ry="46" class="asfill"/>
  <ellipse cx="455" cy="160" rx="60" ry="46" class="as"/>
  <text x="455" y="128" class="lbl" text-anchor="middle" fill="#5b9dff">AS 20 · RIP</text>
  <rect x="433" y="150" width="44" height="22" rx="4" class="core"/>
  <text x="455" y="165" class="lbl" text-anchor="middle">P1·RR</text>

  <!-- AS 30 -->
  <ellipse cx="378" cy="300" rx="60" ry="46" class="asfill"/>
  <ellipse cx="378" cy="300" rx="60" ry="46" class="as"/>
  <text x="378" y="268" class="lbl" text-anchor="middle" fill="#5b9dff">AS 30 · OSPF</text>
  <rect x="356" y="290" width="44" height="22" rx="4" class="core"/>
  <text x="378" y="305" class="lbl" text-anchor="middle">P1·RR</text>

  <!-- inter-AS links (ASBR/MP-BGP) -->
  <line x1="355" y1="160" x2="400" y2="160" class="link"/>
  <line x1="320" y1="198" x2="360" y2="270" class="link"/>
  <line x1="440" y1="198" x2="400" y2="270" class="link"/>
  <text x="377" y="150" class="lbla" text-anchor="middle">MP-BGP</text>

  <!-- ===== UC EXCHANGE sites (green) ===== -->
  <!-- Strasbourg (LAN detail) -->
  <rect x="30" y="120" width="150" height="92" rx="8" class="siteUC"/>
  <text x="40" y="138" class="lblw" font-size="11">UC Exchange — Strasbourg</text>
  <text x="40" y="154" class="lbl">LAN commuté · VLAN</text>
  <text x="40" y="170" class="lbl">MST · VRRP · DHCP</text>
  <text x="40" y="186" class="lbl">10.242.x.0/17</text>
  <text x="40" y="202" class="lbla">CE → PE (statique)</text>

  <!-- Metz (DMZ / services) -->
  <rect x="585" y="120" width="150" height="92" rx="8" class="siteUC"/>
  <text x="595" y="138" class="lblw" font-size="11">UC Exchange — Metz</text>
  <text x="595" y="154" class="lbl">Zone DMZ · serveurs</text>
  <text x="595" y="170" class="lbl">Web / DNS</text>
  <text x="595" y="186" class="lbl">NAT public 11.11.11.1</text>
  <text x="595" y="202" class="lbla">MPLS-VPN + NAT</text>

  <!-- ===== ABC CONSEIL sites (amber) ===== -->
  <rect x="30" y="300" width="150" height="74" rx="8" class="siteABC"/>
  <text x="40" y="318" class="lblw" font-size="11">ABC Conseil — Strasbourg</text>
  <text x="40" y="334" class="lbl">Siège social</text>
  <text x="40" y="350" class="lbl">10.252.x.0/18</text>
  <text x="40" y="366" class="lbl" fill="#f0a868">VRF · RIP (CE-PE)</text>

  <rect x="585" y="248" width="150" height="58" rx="8" class="siteABC"/>
  <text x="595" y="266" class="lblw" font-size="11">ABC Conseil — Nancy</text>
  <text x="595" y="282" class="lbl">Succursale</text>
  <text x="595" y="298" class="lbl">192.168.40.x</text>

  <rect x="585" y="318" width="150" height="58" rx="8" class="siteABC"/>
  <text x="595" y="336" class="lblw" font-size="11">ABC Conseil — Metz</text>
  <text x="595" y="352" class="lbl">Succursale</text>
  <text x="595" y="368" class="lbl">192.168.30.x</text>

  <!-- ===== Links sites <-> core ===== -->
  <!-- UC Strasbourg -> AS10 -->
  <path d="M180 166 L240 160" class="linkmpls" marker-end="url(#ar)"/>
  <!-- UC Metz -> AS20 -->
  <path d="M585 166 L515 160" class="linkmpls" marker-end="url(#ar)"/>
  <!-- ABC Strasbourg -> AS30 -->
  <path d="M180 330 L325 305" class="link" marker-end="url(#ar)"/>
  <!-- ABC Nancy -> AS20 -->
  <path d="M585 277 L512 175" class="link" marker-end="url(#ar)"/>
  <!-- ABC Metz -> AS30 -->
  <path d="M585 345 L432 308" class="link" marker-end="url(#ar)"/>

  <!-- VPC public -->
  <rect x="356" y="404" width="48" height="22" rx="4" class="site"/>
  <text x="380" y="419" class="lbl" text-anchor="middle">VPC pub</text>
  <line x1="380" y1="404" x2="378" y2="346" class="link" marker-end="url(#ar)"/>
  <text x="412" y="418" class="lbl">9.9.9.9 (NAT)</text>

  <!-- legend -->
  <circle cx="40" cy="410" r="5" fill="#4dd4ac"/>
  <text x="52" y="414" class="lbl">UC Exchange (VRF UC_Exchange)</text>
  <circle cx="40" cy="430" r="5" fill="#f0a868"/>
  <text x="52" y="434" class="lbl">ABC Conseil (VRF ABC_Conseil)</text>
</svg>
