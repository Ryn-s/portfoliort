<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pare-feu sur Raspberry Pi : passerelle de sécurité entre Internet et le réseau local, avec filtrage iptables et serveur OpenVPN" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .l{ fill:#9aa7b8; font-size:11px; font-family:'JetBrains Mono',monospace; }
      .w{ fill:#e6edf3; font-size:12px; font-weight:600; }
      .a{ fill:#4dd4ac; font-size:10px; font-family:'JetBrains Mono',monospace; }
      .zone{ fill:#0d1117; stroke:#283040; stroke-width:1; stroke-dasharray:5 4; }
      .node{ fill:#161b22; stroke:#283040; stroke-width:1; }
      .fw{ fill:#1c2330; stroke:#4dd4ac; stroke-width:1.4; }
      .ln{ stroke:#5d6b7d; stroke-width:1.2; fill:none; }
      .lnvpn{ stroke:#5b9dff; stroke-width:1.3; fill:none; stroke-dasharray:5 3; }
    </style>
  </defs>

  <text x="30" y="28" class="w" fill="#e6edf3" font-size="13">Pare-feu sur Raspberry Pi — passerelle de sécurité (projet personnel)</text>
  <text x="30" y="44" class="l">Isolation d'un réseau local · filtrage iptables/nftables · accès distant OpenVPN</text>

  <!-- Internet zone -->
  <rect x="30" y="90" width="150" height="130" rx="10" class="zone"/>
  <text x="105" y="112" class="l" text-anchor="middle" fill="#f0a868">INTERNET</text>
  <rect x="60" y="130" width="90" height="40" rx="6" class="node"/>
  <text x="105" y="153" class="l" text-anchor="middle">trafic entrant</text>
  <rect x="60" y="178" width="90" height="32" rx="6" class="node"/>
  <text x="105" y="198" class="l" text-anchor="middle">client VPN distant</text>

  <!-- Raspberry Pi firewall (center) -->
  <rect x="300" y="100" width="160" height="120" rx="10" class="fw"/>
  <text x="380" y="124" class="w" text-anchor="middle">Raspberry Pi</text>
  <text x="380" y="141" class="l" text-anchor="middle">passerelle / pare-feu</text>
  <line x1="316" y1="152" x2="444" y2="152" stroke="#283040" stroke-width="1"/>
  <text x="380" y="170" class="a" text-anchor="middle">iptables / nftables</text>
  <text x="380" y="188" class="a" text-anchor="middle">règles de filtrage</text>
  <text x="380" y="206" class="a" text-anchor="middle">serveur OpenVPN</text>

  <!-- LAN zone -->
  <rect x="580" y="90" width="160" height="160" rx="10" class="zone"/>
  <text x="660" y="112" class="l" text-anchor="middle" fill="#4dd4ac">RÉSEAU LOCAL (isolé)</text>
  <rect x="610" y="130" width="100" height="34" rx="6" class="node"/>
  <text x="660" y="151" class="l" text-anchor="middle">poste 1</text>
  <rect x="610" y="172" width="100" height="34" rx="6" class="node"/>
  <text x="660" y="193" class="l" text-anchor="middle">poste 2</text>
  <rect x="610" y="214" width="100" height="30" rx="6" class="node"/>
  <text x="660" y="233" class="l" text-anchor="middle">monitoring trafic</text>

  <!-- links -->
  <path d="M180 150 L296 150" class="ln" marker-end="url(#ar4)"/>
  <text x="238" y="142" class="l" text-anchor="middle">filtré</text>
  <path d="M460 150 L576 150" class="ln" marker-end="url(#ar4)"/>

  <!-- VPN tunnel -->
  <path d="M150 194 Q230 250 300 200" class="lnvpn" marker-end="url(#ar4)"/>
  <text x="225" y="248" class="l" text-anchor="middle" fill="#5b9dff">tunnel VPN chiffré</text>

  <!-- legend -->
  <line x1="30" y1="305" x2="54" y2="305" class="ln"/>
  <text x="62" y="309" class="l">trafic filtré</text>
  <line x1="180" y1="305" x2="204" y2="305" class="lnvpn"/>
  <text x="212" y="309" class="l">accès distant sécurisé (OpenVPN)</text>
</svg>
